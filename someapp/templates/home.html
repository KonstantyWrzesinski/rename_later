{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}

<style>
    html {
        scroll-behavior: smooth;
    }

    .home-section {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 60px 20px;
    }

    .hero-title {
        font-size: 64px;
        color: white;
        margin-bottom: 20px;
    }

    .hero-subtitle {
        font-size: 22px;
        color: white;
        margin-bottom: 50px;
    }

    .scroll-arrow {
        font-size: 42px;
        color: white;
        text-decoration: none;
        animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
        0%, 100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(12px);
        }
    }

    .popular-grid {
        display: flex;
        gap: 25px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 35px;
        max-width: 1100px;
    }

        color: white;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        transition: 0.3s;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .city-card:hover {
        transform: translateY(-8px);

    }

    .city-card h3 {
