<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Django App
      {% endblock %}
    </title>
    <style>
        html, body {
    min-height: 100%;
    margin: 0;
}

body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(
        135deg,
        #4facfe 0%,
        #22d3ee 45%,
        #0ea5e9 100%
    );
    background-repeat: no-repeat;
    background-size: 100% 100%;
    color: #2d3748;
    transition: background 0.5s ease, color 0.5s ease;
}

        nav {
            background: rgba(255, 255, 255, 0.85) !important;
            padding: 15px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: background 0.5s ease;
        }

        nav a.navbar-brand {
            color: #1e3a8a !important;
            font-weight: 800;
        }

        nav a.nav-link {
            color: #4a5568 !important;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav a.nav-link:hover {
            color: #2563eb !important;
        }

        nav a.nav-link.active-link {
            color: #2563eb !important; 
            font-weight: 800;
            border-bottom: 3px solid #2563eb; 
        }

        .theme-toggle-btn {
            background: transparent;
            color: #4a5568;
            border: 2px solid #cbd5e1;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
        }

        .theme-toggle-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        h1 {
            color: #1e3a5f;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid transparent;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            border-color: #66a6ff;
        }

        body.dark-theme {
            background: radial-gradient(
            circle at top left,
            #1e293b 0%,
            #0f172a 45%,
            #020617 100%
        ) !important;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-size: cover;
            color: #e2e8f0;
        }
        
        body.dark-theme nav {
            background: rgba(15, 23, 42, 0.85) !important; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        body.dark-theme nav a.navbar-brand {
            color: #38bdf8 !important; 
        }

        body.dark-theme nav a.nav-link {
            color: #94a3b8 !important; 
        }

        body.dark-theme nav a.nav-link:hover {
            color: #e2e8f0 !important; 
        }

        body.dark-theme nav a.nav-link.active-link {
            color: #38bdf8 !important; 
            border-bottom: 3px solid #38bdf8; 
        }

        body.dark-theme .theme-toggle-btn {
            color: #94a3b8;
            border-color: #475569;
        }

        body.dark-theme .theme-toggle-btn:hover {
            background: #1e293b;
            color: #e2e8f0;
            border-color: #64748b;
        }

        body.dark-theme input[type="text"],
        body.dark-theme input[type="password"] {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid #334155;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        body.dark-theme input[type="text"]:focus,
        body.dark-theme input[type="password"]:focus {
            border-color: #38bdf8;
        }
        #dashboardWeatherBox .weather-result-card h2,
        #dashboardWeatherBox .weather-result-card p {
            color: #e2e8f0 !important;
        }

        #dashboardWeatherBox .weather-result-card p {
            font-size: 18px;
            margin: 16px 0;
        }
        /* DASHBOARD WEATHER MODAL */

.dashboard-weather-card {
    position: relative;
    width: 700px;
    max-width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 40px;
    border-radius: 25px;
    text-align: center;
}

body:not(.dark-theme) .dashboard-weather-card {
    background: white !important;
    border: 1px solid #e2e8f0 !important;
    color: #1e3a5f !important;
}

body.dark-theme .dashboard-weather-card {
    background: rgba(30, 41, 59, 0.95) !important;
    border: 1px solid #334155 !important;
    color: #e2e8f0 !important;
}

.dashboard-weather-card h2,
.dashboard-weather-card h3,
.dashboard-weather-card p {
    color: inherit !important;
}

.dashboard-weather-card .close-btn {
    position: absolute;
    top: 15px;
    right: 20px;
    border: none;
    background: none;
    font-size: 28px;
    cursor: pointer;
    color: inherit;
}

.dashboard-weather-card hr {
    margin: 30px 0;
    border: none;
    border-top: 1px solid rgba(120,120,120,0.3);
}

/* FORECAST */

#dashboardForecast {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

#dashboardForecast .forecast-card {
    background: rgba(248,250,252,0.85);
    border-radius: 18px;
    padding: 16px;
    width: 130px;
    text-align: center;
    border: 1px solid #e2e8f0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

body.dark-theme #dashboardForecast .forecast-card {
    background: rgba(15, 23, 42, 0.65) !important;
    border: 1px solid #475569 !important;
}

#dashboardForecast .forecast-card h4 {
    margin: 0 0 10px 0;
    font-size: 16px;
    color: inherit;
}

#dashboardForecast .forecast-card .temps {
    font-size: 22px;
    font-weight: 800;
    margin: 8px 0 0 0;
    color: inherit;
}

#dashboardForecast .forecast-card .temps-min {
    font-size: 15px;
    margin: 4px 0 0 0;
    color: #64748b !important;
}

body.dark-theme #dashboardForecast .forecast-card .temps-min {
    color: #94a3b8 !important;
}
    </style>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <a class="navbar-brand" href="/">Weather App</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active-link{% endif %}" href="/">Home</a>
          </li>
          
          {% if request.user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link {% if 'dashboard' in request.path %}active-link{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
          </li>
          {% endif %}
          
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/team/' %}active-link{% endif %}" href="/team/">Team</a>
          </li>
        </ul>

        <ul class="navbar-nav ml-auto">
          <li class="nav-item d-flex align-items-center mr-3">
            <button class="theme-toggle-btn" onclick="toggleDarkMode()">🌙 Theme</button>
          </li>
          <li class="nav-item">
            {% if request.user.is_authenticated %}
              <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            {% else %}
              <a class="nav-link" href="{% url 'login' %}">Login</a>
            {% endif %}
          </li>
        </ul>
      </div>
    </nav>
    <div class="container" style="padding-top:100px;">
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js" ></script>
    
    <script>
        const body = document.body;
        const themeBtn = document.querySelector('.theme-toggle-btn');

        function updateBtnIcon() {
            if (body.classList.contains('dark-theme')) {
                themeBtn.innerHTML = '☀️ Light';
            } else {
                themeBtn.innerHTML = '🌙 Dark';
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }
        updateBtnIcon();

        function toggleDarkMode() {
            body.classList.toggle('dark-theme');
            
            if (body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateBtnIcon();
        }
    </script>
  </body>
</html>
