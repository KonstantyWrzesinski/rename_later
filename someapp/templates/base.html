<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        Django App
      {% endblock %}
    </title>
    <style>
        /* --- BAZOWE USTAWIENIA --- */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            /* Nowocześniejsza czcionka */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            /* Łagodniejszy, nowoczesny gradient dla trybu jasnego (motyw dziennego nieba) */
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            background-attachment: fixed;
            color: #2d3748; /* Ciemnoszary zamiast smolistej czerni */
            
            /* Płynne przejścia */
            transition: background 0.5s ease, color 0.5s ease; 
        }

        /* --- NAVBAR JASNY --- */
        nav {
            background: rgba(255, 255, 255, 0.85) !important;
            padding: 15px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); /* Delikatny cień oddzielający menu od tła */
            transition: background 0.5s ease;
        }

        nav a.navbar-brand {
            color: #1e3a8a !important; /* Ciemnoniebieski akcent dla logo */
            font-weight: 800;
        }

        nav a.nav-link {
            color: #4a5568 !important; /* Zgaszony ciemnoszary */
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav a.nav-link:hover {
            color: #2563eb !important; /* Wyraźny niebieski przy najechaniu */
        }

        /* --- PRZYCISK ZMIANY MOTYWU --- */
        .theme-toggle-btn {
            background: transparent;
            color: #4a5568;
            border: 2px solid #cbd5e1;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            outline: none;
        }

        .theme-toggle-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        h1 {
            color: #1e3a5f;
        }
        
        /* --- FORMULARZE --- */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid transparent;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            border-color: #66a6ff;
        }

        /* =========================================
           --- STYLE DLA CIEMNEGO MOTYWU --- 
           ========================================= */
        
        body.dark-theme {
            /* Głęboki, elegancki gradient (motyw nocny) zamiast płaskiego czarnego */
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            /* Miękki, "złamany" biały (slate-200) - nie męczy wzroku */
            color: #e2e8f0; 
        }
        
        body.dark-theme nav {
            /* Ciemnogranatowy, półprzezroczysty pasek */
            background: rgba(15, 23, 42, 0.85) !important; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        body.dark-theme nav a.navbar-brand {
            color: #38bdf8 !important; /* Jasnoniebieski akcent logo */
        }

        body.dark-theme nav a.nav-link {
            /* Zgaszony jasnoszary/niebieskawy - eliminuje efekt "żarówki" */
            color: #94a3b8 !important; 
        }

        body.dark-theme nav a.nav-link:hover {
            color: #e2e8f0 !important; /* Delikatne rozjaśnienie przy hoverze */
        }

        body.dark-theme .theme-toggle-btn {
            color: #94a3b8;
            border-color: #475569;
        }

        body.dark-theme .theme-toggle-btn:hover {
            background: #1e293b;
            color: #e2e8f0;
            border-color: #64748b;
        }

        body.dark-theme input[type="text"],
        body.dark-theme input[type="password"] {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid #334155;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        body.dark-theme input[type="text"]:focus,
        body.dark-theme input[type="password"]:focus {
            border-color: #38bdf8;
        }
    </style>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
  </head>
  <body>
    <!-- Usunąłem bg-light z klas Bootstrapa, żeby własne tło w CSS działało gładko w obu motywach -->
    <nav class="navbar navbar-expand-lg fixed-top">
      <a class="navbar-brand" href="http://127.0.0.1:8000/">Weather App</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item active">
            <a class="nav-link" href="http://127.0.0.1:8000/">Home</a>
          </li>
          {% if request.user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
          </li>
          {% endif %}
          <li class="nav-item">
            <a class="nav-link" href="http://127.0.0.1:8000/about/">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="http://127.0.0.1:8000/team/">Team</a>
          </li>
        </ul>
        <ul class="navbar-nav ml-auto">
          <li class="nav-item d-flex align-items-center mr-3">
            <button class="theme-toggle-btn" onclick="toggleDarkMode()">🌙 Theme</button>
          </li>
          <li class="nav-item">
            {% if request.user.is_authenticated %}
              <a class="nav-link" href="{% url 'logout' %}">Logout</a>
            {% else %}
              <a class="nav-link" href="{% url 'login' %}">Login</a>
            {% endif %}
          </li>
        </ul>
      </div>
    </nav>
    <div class="container" style="padding-top:100px;">
        {% block content %}
        {% endblock %}
    </div>
    
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js" ></script>
    
    <script>
        const body = document.body;
        const themeBtn = document.querySelector('.theme-toggle-btn');

        // Funkcja do aktualizacji ikony na przycisku
        function updateBtnIcon() {
            if (body.classList.contains('dark-theme')) {
                themeBtn.innerHTML = '☀️ Light';
            } else {
                themeBtn.innerHTML = '🌙 Dark';
            }
        }

        // Sprawdzanie trybu przy ładowaniu strony
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-theme');
        }
        updateBtnIcon();

        // Przełączanie trybu
        function toggleDarkMode() {
            body.classList.toggle('dark-theme');
            
            if (body.classList.contains('dark-theme')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
            updateBtnIcon();
        }
    </script>
  </body>
</html>
