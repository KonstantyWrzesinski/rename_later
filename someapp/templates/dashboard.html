{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}

<style>
    /* Klasy do obsługi motywów okienek pop-up (Modal) */
    .modal-content {
        background: white;
        padding: 30px;
        border-radius: 25px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .modal-title {
        color: #1e3a5f;
    }

    .modal-input {
        width: 100%;
        margin-bottom: 20px;
        padding: 14px 20px;
        border: 1px solid #ccc;
        border-radius: 15px;
        outline: none;
    }

    .suggestion-item {
        cursor: pointer;
        padding: 8px;
        border-bottom: 1px solid #ddd;
        color: #333;
    }

    /* DARK THEME */
    body.dark-theme .modal-content {
        background: rgba(30, 41, 59, 0.95) !important;
        border: 1px solid #334155 !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4) !important;
    }

    body.dark-theme .modal-title,
    body.dark-theme #deleteCityText {
        color: #e2e8f0 !important;
    }

    body.dark-theme .modal-input {
        background: rgba(15, 23, 42, 0.8) !important;
        border: 1px solid #475569 !important;
        color: #e2e8f0 !important;
    }

    body.dark-theme .suggestion-item {
        color: #e2e8f0 !important;
        border-bottom: 1px solid #475569 !important;
    }

    body.dark-theme .suggestion-item:hover {
        background: rgba(255, 255, 255, 0.1) !important;
    }
</style>

<div style="width:100%; padding:40px;">

    <h1 style="color:white; margin-bottom:30px;">
        Saved Cities
    </h1>

    <p style="color:white; margin-bottom:25px;">
        Left click to view weather. Right click to delete a city.
    </p>

    <div id="citiesContainer" style="
        display:flex;
        gap:20px;
        flex-wrap:wrap;
    "></div>

</div>

<div id="addCityModal" onclick="closeAddCityModal()" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
">

    <div onclick="event.stopPropagation()" class="modal-content" style="width:350px; max-width:90%;">

        <h2 class="modal-title" style="margin-bottom:20px;">Add city</h2>

        <input
            id="cityInputModal"
            class="modal-input"
            type="text"
            placeholder="Enter city name"
        >

        <div id="citySearchResults"></div>

        <button onclick="saveCity()" style="
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            background:#1e3a5f;
            color:white;
            cursor:pointer;
        ">
            Save
        </button>

    </div>

</div>

<div id="deleteCityModal" onclick="closeDeleteCityModal()" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
">

    <div onclick="event.stopPropagation()" class="modal-content" style="width:360px; max-width:90%;">

        <h2 class="modal-title" style="margin-bottom:10px;">
            Delete city
        </h2>

        <p id="deleteCityText" style="margin-bottom:25px; color:#333;">
            Are you sure?
        </p>

        <div style="display:flex; gap:12px;">
            <button onclick="closeDeleteCityModal()" style="
                flex:1;
                padding:12px;
                border:none;
                border-radius:30px;
                background:#e5e7eb;
                color:#1e3a5f;
                cursor:pointer;
            ">
                Cancel
            </button>

            <button onclick="confirmDeleteCity()" style="
                flex:1;
                padding:12px;
                border:none;
                border-radius:30px;
                background:#dc2626;
                color:white;
                cursor:pointer;
            ">
                Delete
            </button>
        </div>

    </div>

</div>

<div id="dashboardWeatherBox" onclick="closeWeatherCard()" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    justify-content:center;
    align-items:center;
    z-index:1000;
">

    <div onclick="event.stopPropagation()" class="modal-content dashboard-weather-card" style="width:450px; max-width:90%; position:relative;">

        <button class="close-btn modal-title"
                onclick="closeWeatherCard()"
                style="
                    position:absolute;
                    top:15px;
                    right:20px;
                    border:none;
                    background:none;
                    font-size:28px;
                    cursor:pointer;
                ">
            ✕
        </button>

        <h2 id="dashboardCityName" class="modal-title"></h2>

        <div id="dashboardIcon"
             class="weather-icon"
             style="font-size:70px; margin:15px 0 25px 0;">
        </div>

        <p id="dashboardTemp" class="modal-title"></p>
        <p id="dashboardHumidity" class="modal-title"></p>
        <p id="dashboardWind" class="modal-title"></p>
        <p id="dashboardCondition" class="modal-title"></p>

        <hr style="
            margin:30px 0;
            border:none;
            border-top:1px solid rgba(120,120,120,0.25);
        ">

        <h3 class="modal-title">3-Day Forecast</h3>

        <div id="dashboardForecast"
             class="forecast-container"
             style="
                display:flex;
                justify-content:center;
                gap:15px;
                flex-wrap:wrap;
                margin-top:20px;
             ">
        </div>

    </div>

</div>

<script>
let cities = [];
let cityToDelete = null;
let citySuggestions = [];
let citySearchTimeout = null;

function formatCityName(city) {
    return city
        .toLowerCase()
        .split(" ")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
}

function searchCitySuggestions() {
 clearTimeout(citySearchTimeout);

 citySearchTimeout = setTimeout(async function() {
  const input = document.getElementById("cityInputModal");
  const resultsBox = document.getElementById("citySearchResults");
  const query = input.value.trim();

  resultsBox.innerHTML = "";
  citySuggestions = [];

  if (query.length < 3) {
   return;
  }

  try {
   const response = await fetch(
    "https://geocoding-api.open-meteo.com/v1/search?name=" +
    encodeURIComponent(query) +
    "&count=5&language=pl&format=json"
   );

   if (!response.ok) {
    throw new Error("Open-Meteo API error");
   }

   const data = await response.json();

   if (!data.results || data.results.length === 0) {
    resultsBox.innerHTML = "<p class='modal-title'>Nie znaleziono miasta.</p>";
    return;
   }

   citySuggestions = data.results.map(function(place) {
    const displayName = [
     place.name,
     place.admin1,
     place.country
    ].filter(Boolean).join(", ");

    return {
     name: place.name,
     displayName: displayName,
     latitude: place.latitude,
     longitude: place.longitude,
     country: place.country
    };
   });

   citySuggestions.forEach(function(city) {
    const result = document.createElement("div");
    result.className = "suggestion-item";
    result.innerText = city.displayName;

    result.onclick = function() {
     input.value = city.displayName;
     resultsBox.innerHTML = "";
    };

    resultsBox.appendChild(result);
   });

  } catch (error) {
   resultsBox.innerHTML = "<p class='modal-title'>Błąd pobierania miast z API.</p>";
   console.log("City search error:", error);
  }
 }, 300);
}

function renderCities() {
    const container = document.getElementById("citiesContainer");
    container.innerHTML = "";

    cities.forEach(function(city) {
        const card = document.createElement("div");

        card.innerText = city;

        card.style.width = "180px";
        card.style.height = "180px";
        card.style.borderRadius = "25px";
        card.style.background = "rgba(255,255,255,0.2)";
        card.style.backdropFilter = "blur(10px)";
        card.style.display = "flex";
        card.style.justifyContent = "center";
        card.style.alignItems = "center";
        card.style.fontSize = "28px";
        card.style.fontWeight = "bold";
        card.style.color = "white";
        card.style.cursor = "pointer";
        card.style.boxShadow = "0 8px 20px rgba(0,0,0,0.15)";

        card.onclick = async function() {
            document.getElementById("dashboardCityName").innerText = city;
            document.getElementById("dashboardTemp").innerText = "Temperature: loading...";
            document.getElementById("dashboardHumidity").innerText = "Humidity: loading...";
            document.getElementById("dashboardWind").innerText = "Wind: loading...";
            document.getElementById("dashboardCondition").innerText = "Condition: loading...";

            document.getElementById("dashboardWeatherBox").style.display = "flex";

            try {
                const response = await fetch("{% url 'dashboard_weather_api' %}?city=" + encodeURIComponent(city));
                const data = await response.json();

                if (!response.ok || !data.ok) {
                    throw new Error(data.error || "Weather API error");
                }

                const weather = data.weather;
                const condition = weather.weather_description || weather.condition || "";

                document.getElementById("dashboardCityName").innerText = weather.city + ", " + weather.country;
                document.getElementById("dashboardTemp").innerText = "Temperature: " + weather.temperature + " " + weather.temperature_unit;
                document.getElementById("dashboardHumidity").innerText = "Humidity: " + weather.humidity + " " + weather.humidity_unit;
                document.getElementById("dashboardWind").innerText = "Wind: " + weather.wind_speed + " " + weather.wind_speed_unit;
                document.getElementById("dashboardCondition").innerText = "Condition: " + condition;
                document.getElementById("dashboardIcon").innerText = getWeatherIcon(condition);

                const forecastBox = document.getElementById("dashboardForecast");
                forecastBox.innerHTML = "";

                if (weather.forecast) {
                    weather.forecast.forEach(function(day) {
                        const forecastCard = document.createElement("div");
                        forecastCard.style.background = "rgba(120,120,120,0.1)";
                        forecastCard.style.padding = "10px";
                        forecastCard.style.borderRadius = "10px";
                        forecastCard.style.textAlign = "center";
                        forecastCard.style.width = "100px";

                        forecastCard.innerHTML = `
                            <h4 class="modal-title" style="margin:0 0 5px 0; font-size:15px;">${day.date}</h4>
                            <div style="font-size:30px; margin-bottom:5px;">${getWeatherIcon(day.description)}</div>
                            <p class="modal-title" style="margin:0; font-weight:bold; font-size:16px;">${day.temp_max}°</p>
                            <p class="modal-title" style="margin:0; font-size:12px; opacity:0.7;">${day.temp_min}°</p>
                        `;

                        forecastBox.appendChild(forecastCard);
                    });
                }

            } catch (error) {
                document.getElementById("dashboardTemp").innerText = "Temperature: -";
                document.getElementById("dashboardHumidity").innerText = "Humidity: -";
                document.getElementById("dashboardWind").innerText = "Wind: -";
                document.getElementById("dashboardCondition").innerText = "Condition: " + error.message;
            }
        };

        card.oncontextmenu = function(e) {
            e.preventDefault();
            openDeleteCityModal(city);
        };

        container.appendChild(card);
    });

    const addCard = document.createElement("div");

    addCard.innerText = "+";

    addCard.style.width = "180px";
    addCard.style.height = "180px";
    addCard.style.border = "3px dashed rgba(255,255,255,0.7)";
    addCard.style.borderRadius = "25px";
    addCard.style.display = "flex";
    addCard.style.justifyContent = "center";
    addCard.style.alignItems = "center";
    addCard.style.cursor = "pointer";
    addCard.style.background = "rgba(255,255,255,0.15)";
    addCard.style.backdropFilter = "blur(10px)";
    addCard.style.fontSize = "60px";
    addCard.style.color = "white";

    addCard.onclick = function() {
        addCity();
    };

    container.appendChild(addCard);
}

function addCity() {
    document.getElementById("addCityModal").style.display = "flex";
}

function closeAddCityModal() {
    document.getElementById("addCityModal").style.display = "none";
}

async function saveCity() {

    const city = document.getElementById("cityInputModal").value.trim();

    if (!city) return;

    const selectedCity = citySuggestions.find(function(suggestion) {
        return suggestion.displayName === city;
    });

    const formattedCity = selectedCity
        ? selectedCity.name
        : formatCityName(city);

    try {

        const response = await fetch("{% url 'save_city' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({
                city: formattedCity
            })
        });

        const data = await response.json();

        if (data.ok) {

            if (!cities.includes(formattedCity)) {
                cities.push(formattedCity);
            }

            renderCities();
        }

    } catch(error) {
        console.log(error);
    }

    document.getElementById("cityInputModal").value = "";
    document.getElementById("citySearchResults").innerHTML = "";

    closeAddCityModal();
}

function openDeleteCityModal(city) {
    cityToDelete = city;
    document.getElementById("deleteCityText").innerText =
        "Are you sure you want to delete " + city + "?";
    document.getElementById("deleteCityModal").style.display = "flex";
}

function closeDeleteCityModal() {
    cityToDelete = null;
    document.getElementById("deleteCityModal").style.display = "none";
}

async function confirmDeleteCity() {

    if (!cityToDelete) return;

    try {

        const response = await fetch("{% url 'delete_city' %}", {
            method: "DELETE",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            body: JSON.stringify({
                city: cityToDelete
            })
        });

        const data = await response.json();

        if (data.ok) {

            cities = cities.filter(c => c !== cityToDelete);

            renderCities();
        }

    } catch(error) {
        console.log(error);
    }

    closeDeleteCityModal();
}

function closeWeatherCard() {
    document.getElementById("dashboardWeatherBox").style.display = "none";
}

document.getElementById("cityInputModal").addEventListener("input", searchCitySuggestions);

async function loadCities() {

    try {
        const response = await fetch("{% url 'get_saved_cities' %}");
        const data = await response.json();

        if (data.ok) {
            cities = data.cities;
            renderCities();
        }

    } catch(error) {
        console.log(error);
    }
}

loadCities();

function getCSRFToken() {

    const cookies = document.cookie.split(";");

    for (let cookie of cookies) {

        cookie = cookie.trim();

        if (cookie.startsWith("csrftoken=")) {
            return cookie.substring("csrftoken=".length);
        }
    }

    return "";
}
function getWeatherIcon(condition) {
    if (!condition) {
        return "🌦️";
    }

    const text = condition.toLowerCase();

    if (text.includes("clear")) return "☀️";
    if (text.includes("cloud") || text.includes("overcast")) return "☁️";
    if (text.includes("rain") || text.includes("drizzle")) return "🌧️";
    if (text.includes("storm") || text.includes("thunder")) return "⛈️";
    if (text.includes("snow")) return "❄️";
    if (text.includes("mist") || text.includes("fog")) return "🌫️";

    return "🌦️";
}
</script>

{% endblock %}
